[PHP]
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

log_errors = On
memory_limit = 512M
upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 120
expose_php = Off

# Fixes errors when opening error log /proc/self/fd/2
error_log = /proc/self/fd/2
daemonize = no