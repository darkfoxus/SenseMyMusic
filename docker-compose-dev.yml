name: ${COMPOSE_PROJECT_NAME}

services:
  app:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    image: ${COMPOSE_PROJECT_NAME}:beta
    user: "${UID}:${GID}"
    working_dir: /var/www
    environment:
      # Laravel app
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:${BACKEND_PORT}
      # Database connection
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432   # internal container port, always 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Run seeders
      RUN_SEEDER: ${RUN_SEEDER:-false}
      # Xdebug
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CONFIG: "client_host=host.docker.internal"
    volumes:
      - ./app_src/laravel_backend:/var/www
      #- laravel_vendor:/var/www/vendor
    networks:
      - dev
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "${BACKEND_PORT}:80"
    volumes:
      - ./app_src/laravel_backend:/var/www 
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    networks:
      - dev
    depends_on:
      - app

networks:
  dev:
    driver: bridge

volumes:
  postgres_data:
  laravel_vendor:

